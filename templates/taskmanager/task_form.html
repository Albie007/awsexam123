{% extends 'base.html' %}
{% block title %}{{ action }} Task – TaskFlow{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card glass">
    <div class="form-card-header">
      <h1 class="form-title">{{ action }} Task</h1>
      <a href="{% url 'dashboard' %}" class="btn btn-ghost btn-sm">← Back</a>
    </div>

    <form method="post" class="task-form">
      {% csrf_token %}
      {% for field in form %}
        <div class="field-wrap">
          <label class="field-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <span class="field-error">{{ field.errors|join:", " }}</span>
          {% endif %}
        </div>
      {% endfor %}
      <div class="form-actions">
        <button id="btn-save-task" type="submit" class="btn btn-primary">{{ action }} Task</button>
        <a href="{% url 'dashboard' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
