{% extends 'base.html' %}
{% block title %}Delete Task – TaskFlow{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card glass danger-card">
    <div class="danger-icon">⚠️</div>
    <h1 class="form-title">Delete Task</h1>
    <p class="danger-msg">Are you sure you want to delete <strong>"{{ task.title }}"</strong>? This action cannot be undone.</p>
    <form method="post" class="form-actions">
      {% csrf_token %}
      <button id="btn-confirm-delete" type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'dashboard' %}" class="btn btn-ghost">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
