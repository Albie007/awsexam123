server {
    listen 80;
    server_name _;          # Replace _ with your EC2 IP or domain name

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy           "same-origin"  always;

    # ── Static files (served directly by Nginx – zero Django overhead) ──
    location /static/ {
        alias /home/ubuntu/awsexam12/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media files ───────────────────────────────────────────
    location /media/ {
        alias /home/ubuntu/awsexam12/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Proxy everything else to Gunicorn via Unix socket ─────
    location / {
        include             proxy_params;
        proxy_pass          http://unix:/run/taskflow/gunicorn.sock;

        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Upload / timeout limits
        client_max_body_size  20M;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }

    # ── Custom error pages ────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
